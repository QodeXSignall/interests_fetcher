[Interests]
MAX_LOOKBACK_DAYS = 2               # Максимум погружения в поисках интересов
MAX_INTERESTS_PER_BATCH = 8         # Сколько максимум интересов обрабатывать за один обход рега
MERGE_OVERLAP_INTERESTS = true      # Объединять интересы у которых нахлестывается время начало или конца
MAX_WAIT_TIME_MINUTES = 45          # Максимальное ожидание движения после концевика, если не дождется - сброс
DOWNLOADING_INTERVAL = 30           # Интервалы для анализа треков и поиска инетересов
MIN_STOP_SPEED = 3                  # Минимальная скорость, ниже которой считается остановка
MIN_STOP_DURATION_SEC = 6          # Длительность остановки, выше которой точно считается стоянка (начало интереса)
MIN_MOVE_SPEED = 3                  # Минимальная скорость, больше которой считается движение
MIN_MOVE_DURATION_SEC = 1           # Минимальное время движения, выше которой точно считается начало поездки (конец интереса)
MAX_LOOKBACK_SECONDS = 500          # Максимальная дальность (в треках) на которую пойдем в поисках стопа после концевика
TRACKS_PREALARM_LOOKBACK_SEC = 120  # Доп. окно назад для запроса tracks-alarms относительно start_time
SHORT_WINDOW_FALLBACK_SEC = 30      # Fallback времени ДО интереса, если в коротком окне не удалось подтвердить остановку
MIN_SPEED_FOR_SWITCH_DETECT = 10    # Максимальная скорость, после которой скипаем срабатывания концевиков
PHOTO_AFTER_SHIFT_SEC = 13          # Делать фото ПОСЛЕ за указанное количество секунд до начала движения
INTEREST_EURO_BEFORE_SHIFT_SEC = 0  # Двигать начало интереса вперед на указанное количество секунд
INTEREST_KGO_BEFORE_SHIFT_SEC = 15  # Двигать начало интереса вперед на указанное количество секунд
GAP_THRESHOLD_SEC = 5              # Минимальное время разрыва между треками, чтобы начать искать срабатывания в io reports
IGNORE_POINTS_TOLERANCE = 50        # В пределах скольки метров от точек игнора (ДЕПО, МПЗ) игнорировать интересы
DOWNLOAD_CLIPS_MAX_ATTEMPTS = 5     # Повторы POST /download-clips-for-interest при сетевых/5xx ошибках
DOWNLOAD_CLIPS_RETRY_DELAY_SEC = 12 # Пауза между попытками (экспоненциальный множитель внутри клиента)
DOWNLOAD_INTEREST_ROUNDS = 3        # Полных повтора запроса клипов, если по какому-то каналу нет path
DOWNLOAD_INTEREST_ROUND_DELAY_SEC = 20

# Санитарные ограничители pending_interests (страховка от «монстров» и застрявших интересов)
INTEREST_MAX_DURATION_MIN = 40          # Интересы длиннее считаем мусором и в работу не берём (dead-letter)
INTEREST_MAX_DOWNLOAD_ATTEMPTS = 5      # Сколько подряд неудач download-clips до dead-letter

# --- gaps (поздние треки) ---
# Детекция
GAP_MIN_DURATION_SEC = 120          # Минимальный разрыв между двумя соседними треками, чтобы считать это gap'ом
GAP_IGNORE_STATIONARY = true        # Игнорировать разрыв, если по обоим концам признаки стоянки (ls==4 и es!=0)
GAP_EDGE_IGNORE = true              # Игнорировать разрывы, для которых нет соседнего трека внутри окна (края окна)

# Расписание перепроверки
GAP_RECHECK_INTERVAL_HOURS = 4      # Минимальная пауза между перепроверками одного gap'а
GAP_RECHECK_CONTEXT_MIN = 30        # Доп. контекст слева/справа от gap'а при перезапросе треков (минут)
GAP_MAX_AGE_HOURS = 72              # Максимальный возраст gap'а, после которого он становится abandoned
GAP_STABLE_NO_PROGRESS_CHECKS = 1   # Сколько подряд проверок без прогресса до перевода в abandoned

# Публикация
PUBLICATION_GAP_BUFFER_MIN = 5      # Буфер в минутах до/после интереса для проверки пересечения с активным gap'ом

# GC
GAP_TTL_DAYS_CLOSED = 7             # Через сколько дней удалять closed-гэпы
GAP_TTL_DAYS_ABANDONED = 30         # Через сколько дней удалять abandoned-гэпы

# --- alarm-fallback при abandonment (последний шанс, когда треков так и не пришло) ---
# Включён ли fallback вообще
GAP_ALARM_FALLBACK_ENABLED = true

# Длительность "хвостов" окна вокруг аларма (секунды). При наличии alarm.end используется
# [alarm.start - GAP_ALARM_FALLBACK_BEFORE_SEC, alarm.end + GAP_ALARM_FALLBACK_AFTER_SEC].
# Если alarm.end отсутствует — [alarm.start - GAP_ALARM_FALLBACK_BEFORE_SEC,
#                                alarm.start + GAP_ALARM_FALLBACK_NOEND_AFTER_SEC].
GAP_ALARM_FALLBACK_BEFORE_SEC = 120         # -2 мин от начала аларма
GAP_ALARM_FALLBACK_AFTER_SEC = 120          # +2 мин от конца аларма
GAP_ALARM_FALLBACK_NOEND_AFTER_SEC = 300    # +5 мин если у аларма нет end

# Кластеризация: если две группы окон (по правилам выше) пересекаются или расстояние
# между ними меньше этого значения — объединяем в один fallback-интерес.
GAP_ALARM_FALLBACK_MERGE_GAP_SEC = 30

# Если у аларма есть скорость и она >= этого значения (десятые км/ч) — аларм игнорируем.
# Эквивалентно MIN_STOP_SPEED (тоже в десятых). Используем тот же порог.
GAP_ALARM_FALLBACK_MAX_SPEED_TENTH = 3

