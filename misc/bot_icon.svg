<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3D8BFF"/>
      <stop offset="0.55" stop-color="#2E6BF0"/>
      <stop offset="1" stop-color="#6A4BF2"/>
    </linearGradient>
    <linearGradient id="bubble" x1="120" y1="110" x2="380" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EAF1FF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#10204A" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="500" height="500" rx="112" fill="url(#bg)"/>
  <!-- subtle highlight -->
  <rect x="0" y="0" width="500" height="500" rx="112" fill="#FFFFFF" opacity="0.06"/>

  <!-- chat bubble -->
  <g filter="url(#soft)">
    <path d="M150 110
             h200
             a60 60 0 0 1 60 60
             v140
             a60 60 0 0 1 -60 60
             h-92
             l-58 52
             v-52
             h-50
             a60 60 0 0 1 -60 -60
             v-140
             a60 60 0 0 1 60 -60 z"
          fill="url(#bubble)"/>
  </g>

  <!-- tracker target -->
  <g transform="translate(250 240)">
    <circle r="86" fill="none" stroke="#2E6BF0" stroke-width="16" opacity="0.18"/>
    <circle r="86" fill="none" stroke="#2E6BF0" stroke-width="16"
            stroke-linecap="round" stroke-dasharray="300 540" transform="rotate(-90)"/>
    <circle r="50" fill="none" stroke="#6A4BF2" stroke-width="14"/>
    <circle r="16" fill="#2E6BF0"/>
    <!-- crosshair ticks -->
    <g stroke="#2E6BF0" stroke-width="14" stroke-linecap="round">
      <line x1="0" y1="-118" x2="0" y2="-100"/>
      <line x1="0" y1="100" x2="0" y2="118"/>
      <line x1="-118" y1="0" x2="-100" y2="0"/>
      <line x1="100" y1="0" x2="118" y2="0"/>
    </g>
    <!-- orbiting tracked dot -->
    <circle cx="86" cy="0" r="15" fill="#6A4BF2" transform="rotate(-38)"/>
  </g>
</svg>
